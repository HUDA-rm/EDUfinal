<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — EDU Platform</title>
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080c14;
        --bg1: #0d1425;
        --bg2: #111b30;
        --accent: #00e5ff;
        --accent2: #7c3aed;
        --accent3: #f97316;
        --white: #f0f4ff;
        --muted: rgba(240, 244, 255, 0.55);
        --border: rgba(0, 229, 255, 0.12);
        --glow: 0 0 40px rgba(0, 229, 255, 0.15);
        --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--white);
        line-height: 1.7;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 50% at 20% -10%,
            rgba(124, 58, 237, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 80% 110%,
            rgba(0, 229, 255, 0.12) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 1.2rem 0;
        transition: var(--transition);
      }
      nav.scrolled {
        background: rgba(8, 12, 20, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 0.8rem 0;
      }
      .nav__container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav__logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.6rem;
        color: var(--white);
        text-decoration: none;
        letter-spacing: -1px;
      }
      .nav__logo span {
        color: var(--accent);
      }
      .nav__links {
        display: flex;
        list-style: none;
        gap: 2.5rem;
        align-items: center;
      }
      .nav__links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: var(--transition);
        position: relative;
      }
      .nav__links a::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--accent);
        border-radius: 2px;
        transition: var(--transition);
      }
      .nav__links a:hover {
        color: var(--white);
      }
      .nav__links a:hover::after,
      .nav__links a.active::after {
        width: 100%;
      }
      .nav__links a.active {
        color: var(--accent);
      }
      .nav__cta {
        background: var(--accent);
        color: var(--bg) !important;
        padding: 0.6rem 1.4rem !important;
        border-radius: 50px;
        font-weight: 700 !important;
      }
      .nav__cta::after {
        display: none !important;
      }
      .nav__cta:hover {
        background: #33eaff !important;
        transform: translateY(-1px);
        box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4);
      }
      .nav__toggle {
        display: none;
        background: none;
        border: none;
        color: var(--white);
        font-size: 1.5rem;
        cursor: pointer;
      }

      /* AUTH USER in NAV */
      .nav__user {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        position: relative;
      }
      .nav__user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--white);
        cursor: pointer;
        border: 2px solid var(--border);
        transition: var(--transition);
      }
      .nav__user-avatar:hover {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
      }
      .nav__user-name {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--white);
      }
      .nav__dropdown {
        position: absolute;
        top: calc(100% + 12px);
        right: 0;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 12px;
        min-width: 160px;
        padding: 0.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
        transition: var(--transition);
      }
      .nav__dropdown.open {
        opacity: 1;
        pointer-events: all;
        transform: translateY(0);
      }
      .nav__dropdown a,
      .nav__dropdown button {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        width: 100%;
        padding: 0.55rem 0.9rem;
        border-radius: 8px;
        font-size: 0.88rem;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: var(--transition);
        font-family: "DM Sans", sans-serif;
      }
      .nav__dropdown a:hover,
      .nav__dropdown button:hover {
        background: rgba(0, 229, 255, 0.07);
        color: var(--white);
      }
      .nav__dropdown .logout-btn {
        color: rgba(249, 115, 22, 0.75);
      }
      .nav__dropdown .logout-btn:hover {
        background: rgba(249, 115, 22, 0.1);
        color: var(--accent3);
      }

      /* PAGE LAYOUT */
      .page-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 7rem 1.5rem 3rem;
        position: relative;
        z-index: 1;
      }

      /* AUTH CARD */
      .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 2.8rem 2.5rem;
        box-shadow:
          0 0 60px rgba(0, 229, 255, 0.07),
          0 30px 80px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .auth-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 20%;
        right: 20%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 2px;
      }

      .auth-card__icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.15),
          rgba(124, 58, 237, 0.15)
        );
        border: 1px solid rgba(0, 229, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        color: var(--accent);
        margin-bottom: 1.5rem;
      }
      .auth-card__title {
        font-family: "Syne", sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 0.4rem;
      }
      .auth-card__sub {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 2rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }
      .form-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .input-wrap {
        position: relative;
      }
      .input-wrap i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 1.1rem;
        pointer-events: none;
        transition: var(--transition);
      }
      .input-wrap input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.8rem;
        background: var(--bg2);
        border: 1px solid rgba(0, 229, 255, 0.1);
        border-radius: 12px;
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        outline: none;
        transition: var(--transition);
      }
      .input-wrap input::placeholder {
        color: rgba(240, 244, 255, 0.3);
      }
      .input-wrap input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
      }
      .input-wrap input:focus + i,
      .input-wrap:focus-within i {
        color: var(--accent);
      }

      /* Eye toggle */
      .eye-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.1rem;
        transition: var(--transition);
        padding: 0;
      }
      .eye-toggle:hover {
        color: var(--accent);
      }

      .form-footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.6rem;
      }
      .remember-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }
      .remember-label input[type="checkbox"] {
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }
      .forgot-link {
        font-size: 0.85rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
      }
      .forgot-link:hover {
        color: #33eaff;
      }

      .btn-auth {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, var(--accent), #00b8d9);
        color: var(--bg);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(0, 229, 255, 0.35);
      }
      .btn-auth:active {
        transform: translateY(0);
      }
      .btn-auth .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.3);
        border-top-color: var(--bg);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }
      .btn-auth.loading .btn-text {
        display: none;
      }
      .btn-auth.loading .spinner {
        display: block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .auth-divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .auth-switch {
        text-align: center;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .auth-switch a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
      }
      .auth-switch a:hover {
        color: #33eaff;
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 90px;
        right: 20px;

        padding: 0.85rem 1.3rem;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 500;
        z-index: 9999;

        display: flex;
        align-items: center;
        gap: 0.6rem;

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);

        transform: translateX(120%);
        transition: var(--transition);
        max-width: 320px;

        opacity: 0.9;
      }

      .toast.show {
        transform: translateX(0);
      }

      .toast.success {
        background: rgba(0, 191, 143, 0.15);
        border: 1px solid rgba(0, 191, 143, 0.4);
        color: #00bf8f;
      }
      .toast.error {
        background: rgba(249, 115, 22, 0.12);
        border: 1px solid rgba(249, 115, 22, 0.35);
        color: var(--accent3);
      }

      @media (max-width: 640px) {
        .nav__links {
          display: none;
          flex-direction: column;
          position: fixed;
          top: 0;
          right: 0;
          bottom: 0;
          width: 280px;
          background: rgba(13, 20, 37, 0.98);
          backdrop-filter: blur(30px);
          padding: 6rem 2rem 2rem;
          border-left: 1px solid var(--border);
        }
        .nav__links.open {
          display: flex;
        }
        .nav__toggle {
          display: block;
        }
        .auth-card {
          padding: 2rem 1.5rem;
        }
      }
      @media (max-width: 480px) {
        .auth-wrap {
          padding: 7rem 1rem 2rem;
        }
        .auth-card {
          padding: 1.8rem 1.2rem;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav id="navbar">
      <div class="nav__container">
        <a href="index.html" class="nav__logo">EDU<span>.</span></a>
        <ul class="nav__links" id="navLinks">
          <li><a href="index.html">Home</a></li>
          <li><a href="coaching.html">Coaching</a></li>
          <li><a href="courses.html">Courses</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li id="navAuthArea"></li>
        </ul>
        <button class="nav__toggle" id="navToggle" aria-label="Toggle menu">
          <i class="uil uil-bars" id="menuIcon"></i>
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="page-main">
      <div class="auth-card">
        <div class="auth-card__icon"><i class="uil uil-sign-in-alt"></i></div>
        <h1 class="auth-card__title">Welcome back</h1>
        <p class="auth-card__sub">Sign in to continue your learning journey</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <div class="input-wrap">
              <input
                type="email"
                id="loginEmail"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
              <i class="uil uil-envelope"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="loginPassword"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <i class="uil uil-lock"></i>
              <button
                type="button"
                class="eye-toggle"
                id="eyeToggle"
                aria-label="Show password"
              ></button>
            </div>
          </div>

          <div class="form-footer-row">
            <label class="remember-label">
              <input type="checkbox" id="rememberMe" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-auth" id="loginBtn">
            <span class="btn-text"
              ><i class="uil uil-sign-in-alt"></i> Sign In</span
            >
            <div class="spinner"></div>
          </button>
        </form>

        <div class="auth-divider">or</div>
        <p class="auth-switch">
          Don't have an account? <a href="register.html">Create new one</a>
        </p>
      </div>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
      // ── Nav scroll ──
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () =>
        navbar.classList.toggle("scrolled", window.scrollY > 30),
      );

      // ── Mobile toggle ──
      const navToggle = document.getElementById("navToggle");
      const navLinks = document.getElementById("navLinks");
      const menuIcon = document.getElementById("menuIcon");
      navToggle.addEventListener("click", () => {
        const open = navLinks.classList.toggle("open");
        menuIcon.className = open ? "uil uil-multiply" : "uil uil-bars";
      });

      // ── Auth state in nav ──
      function renderNavAuth() {
        const area = document.getElementById("navAuthArea");
        const user = JSON.parse(localStorage.getItem("currentUser") || "null");
        if (user) {
          const initials = user.name
            .split(" ")
            .map((w) => w[0])
            .join("")
            .toUpperCase()
            .slice(0, 2);
          area.innerHTML = `
          <div class="nav__user" id="navUser">
            <div class="nav__user-avatar" id="userAvatarBtn">${initials}</div>
            <span class="nav__user-name">Hi, ${user.name.split(" ")[0]}</span>
            <div class="nav__dropdown" id="navDropdown">
              <a href="#"><i class="uil uil-user-circle"></i> Profile</a>
              <button class="logout-btn" onclick="logout()"><i class="uil uil-sign-out-alt"></i> Logout</button>
            </div>
          </div>`;
          document
            .getElementById("userAvatarBtn")
            .addEventListener("click", (e) => {
              e.stopPropagation();
              document.getElementById("navDropdown").classList.toggle("open");
            });
          document.addEventListener("click", () =>
            document.getElementById("navDropdown")?.classList.remove("open"),
          );
        } else {
          area.innerHTML = `<a href="login.html" class="nav__cta active">Login</a>`;
        }
      }
      renderNavAuth();

      function logout() {
        localStorage.removeItem("currentUser");
        window.location.reload();
      }

      // ── Password toggle ──
      const eyeToggle = document.getElementById("eyeToggle");
      const eyeIcon = document.getElementById("eyeIcon");
      const loginPass = document.getElementById("loginPassword");
      eyeToggle.addEventListener("click", () => {
        const hidden = loginPass.type === "password";
        loginPass.type = hidden ? "text" : "password";
        eyeIcon.className = hidden ? "uil uil-eye-slash" : "uil uil-eye";
      });

      // ── Toast ──
      function showToast(msg, type = "error") {
        const t = document.getElementById("toast");
        const icon =
          type === "success" ? "uil-check-circle" : "uil-exclamation-circle";
        t.innerHTML = `<i class="uil ${icon}"></i> ${msg}`;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      // ── Login ──
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value.trim();
          const password = document.getElementById("loginPassword").value;
          const btn = document.getElementById("loginBtn");

          btn.classList.add("loading");

          setTimeout(() => {
            btn.classList.remove("loading");
            const users = JSON.parse(localStorage.getItem("users") || "[]");
            const user = users.find(
              (u) => u.email === email && u.password === password,
            );

            if (user) {
              localStorage.setItem("currentUser", JSON.stringify(user));
              showToast(
                "Welcome back, " + user.name.split(" ")[0] + "! 🎉",
                "success",
              );
              setTimeout(() => (window.location.href = "index.html"), 1200);
            } else {
              showToast("Invalid email or password");
            }
          }, 900);
        });

      // Redirect if already logged in
      if (localStorage.getItem("currentUser"))
        window.location.href = "index.html";
    </script>
  </body>
</html>
